name: Recovery Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Cleanup Space
      run: |
        sudo rm -rf /usr/share/dotnet /etc/mysql /var/lib/mysql
        sudo apt-get purge azure-cli google-cloud-sdk hhvm google-chrome-stable firefox dotnet-sdk-* openjdk-8-jdk-* php* sudo apt-get autoremove -y

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z-dev libgl1-mesa-dev libxml2-utils xsltproc unzip bc python

    - name: Install Repo Tool
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        export PATH=~/bin:$PATH

    - name: Sync TWRP Source
      run: |
        mkdir work
        cd work
        git config --global user.name "opek098"
        git config --global user.email "ilyasmuhamadilya@gmail.com"
        ~/bin/repo init --u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
        ~/bin/repo sync -j$(nproc --all) --force-sync

    - name: Build Recovery
      run: |
        cd work
        git clone https://github.com/opek098/android_device_meizu_note21pro.git device/meizu/meizu_note21pro
        . build/envsetup.sh
        lunch twrp_meizu_note21pro-eng
        mka vendor_bootimage -j$(nproc --all)

    - name: Upload Result
      uses: actions/upload-artifact@v3
      with:
        name: TWRP-Meizu-Note21Pro
        path: work/out/target/product/meizu_note21pro/vendor_boot.img
